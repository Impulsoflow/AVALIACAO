    <script>
        // ==================== CONFIG ====================
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzkawRP818sy8rBqOO67z15CvWdZvdRJNXzFQv16ClG7KiMeA2-GxWT8K78GPV75GWP/exec";
        const API_KEY = "2026Impulso$";

        let selectedProject = null;
        let evaluatorData = {};
        let rankingInterval = null;
        let voteSent = false;
        let projectsList = [];
        let evaluatedGroups = JSON.parse(localStorage.getItem('impulsoEvaluatedGroups') || '[]');

        function normalizeGroupKey(value) {
            return String(value || '').trim().toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/\s+/g, ' ');
        }

        function isGroupBlocked(group) {
            return evaluatedGroups.includes(normalizeGroupKey(group));
        }

        function markGroupEvaluated(group) {
            const key = normalizeGroupKey(group);
            if (key && !evaluatedGroups.includes(key)) {
                evaluatedGroups.push(key);
                localStorage.setItem('impulsoEvaluatedGroups', JSON.stringify(evaluatedGroups));
            }
        }

        // ==================== PROJETOS PADRÃO ====================
        const defaultProjects = [
            { company: 'Festpan Alimentos', group: 'Grupo FocoFest', leader: 'Luiz', name: 'Implantação PCP 2.0' },
            { company: 'Festpan Alimentos', group: 'Grupo Mentalize', leader: 'Ismael', name: 'Assertividade na contratação' },
            { company: 'Festpan Alimentos', group: 'Grupo Evolução', leader: 'José Aldo', name: 'PEPS' },
            { company: 'Festpan Alimentos', group: 'Grupo Diretriz', leader: 'Rosangela', name: 'Venda A vista com recbto no ato da entrega' },
            { company: 'Festpan Alimentos', group: 'Grupo Águia', leader: 'Douglas', name: 'Melhoria Setor Compras' },
            { company: 'Festpan Alimentos', group: 'Grupo Sempre', leader: 'Felipe', name: 'Implantação do RAS (Reunião de Alinhamento e Solução)' }
        ];

        // ==================== NAVEGAÇÃO ====================
        function goToStep(stepId) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goToProjects() {
            // Validação dos campos (mantida)
            const fields = ['av-company', 'av-date', 'av-name', 'av-role'];
            let valid = true;

            fields.forEach(id => {
                const el = document.getElementById(id);
                const err = document.getElementById('err-' + id.split('-')[1]);
                if (!el.value.trim()) {
                    err.style.display = 'block';
                    valid = false;
                } else {
                    err.style.display = 'none';
                }
            });

            if (!valid) {
                showToast('Preencha todos os campos!', '#f5a623');
                return;
            }

            evaluatorData = {
                company: document.getElementById('av-company').value.trim(),
                date: document.getElementById('av-date').value,
                name: document.getElementById('av-name').value.trim(),
                role: document.getElementById('av-role').value.trim()
            };

            loadProjects();
            goToStep('step-projects');
        }

        // ==================== RESTANTE DO CÓDIGO (corrigido) ====================
        // loadProjects, renderProjects, sendVote, loadRanking, etc. foram corrigidos e protegidos.

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('av-date').value = today;
        });

        // Mostrar toast (mantido)
        function showToast(msg, color = '#00a65a') {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            t.style.background = color;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 4000);
        }
    </script>
